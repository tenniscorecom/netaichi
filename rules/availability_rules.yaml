# 空き状況チェックの条件
#
# account:      チェックに使うアカウントグループ
# months_ahead: 何ヶ月先までチェックするか
# rules:        チェックルールのリスト（複数可）
#   name:   ルール名（ログ・通知用）
#   parks:  チェック対象施設リスト
#     keyword:      施設名検索のキーワード
#     court_filter: 施設名にこれを含むもののみ対象
#     show_court:   falseならコート名を通知に出さず日付・時間だけにまとめる
#   days:   weekend_holiday（土日祝）または曜日リスト（月=0,火=1,...,日=6）
#   times:  この時間範囲に重なる空きを通知する [[開始, 終了], ...]
account: oguri
months_ahead: 2
rules:
  - name: 土日祝 全施設
    parks:
      - keyword: 大高緑地
        court_filter: [庭球場]
      - keyword: 小幡緑地
        court_filter: [庭球場]
      - keyword: 愛・地球博記念公園
        court_filter: [庭球場, フットサル]
      - keyword: 愛知県森林公園
        court_filter: [コート]
        show_court: false  # あまり使わないので日付・時間だけ通知
    days: weekend_holiday
    times: [[9, 17]]
