# 空き状況チェックの条件
#
# account:      チェックに使うアカウントグループ
# months_ahead: 何ヶ月先までチェックするか
# rules:        チェックルールのリスト（複数可）
#   name:   ルール名（ログ・通知用）
#   site:   netaichi（県施設、デフォルト）または eaichi（市町村施設、ログイン不要）
#   municipality: site=eaichi のとき必須。自治体名（例: 日進市）
#   parks:  チェック対象施設リスト
#     keyword:      施設名検索のキーワード
#     court_filter: 施設名にこれを含むもののみ対象
#     show_court:   false=コート名なしで日付・時間だけにまとめる
#                   group=コート番号は落としcourt_filterの種別だけ表示
#     show_hall:    falseなら館名を出さずコート名だけで表示（例: 香久山テニス１）
#   days:   weekend_holiday（土日祝）または曜日リスト（月=0,火=1,...,日=6）
#   times:  この時間範囲に重なる空きを通知する [[開始, 終了], ...]
account: oguri
months_ahead: 2
rules:
  - name: 土日祝 全施設
    parks:
      - keyword: 大高緑地
        court_filter: [庭球場]
      - keyword: 小幡緑地
        court_filter: [庭球場]
      - keyword: 愛・地球博記念公園
        court_filter: [庭球場, フットサル]
        show_court: group  # コート番号は出さず種別（庭球場/フットサル）だけ表示
      - keyword: 愛知県森林公園
        court_filter: [コート]
        show_court: false  # あまり使わないので日付・時間だけ通知
    days: weekend_holiday
    times: [[9, 17]]
  - name: 日進市 土日祝
    site: eaichi
    municipality: 日進市
    parks:
      - keyword: 市営テニスコート
        court_filter: [西山, 香久山]  # 藤島は対象外
        show_hall: false  # 館名を出さずコート名（西山テニス等）だけで表示
      - keyword: 上納池テニスコート
        court_filter: [テニス, コート]
        show_hall: false
    days: weekend_holiday
    times: [[9, 17]]
  - name: 上納池 平日夜
    site: eaichi
    municipality: 日進市
    parks:
      - keyword: 上納池テニスコート
        court_filter: [テニス, コート]
        show_hall: false
    days: [0, 1, 2, 3, 4]
    times: [[19, 24]]
  - name: 名古屋 土日祝
    site: nagoya
    parks:
      - keyword: 若宮大通公園テニスコート
        code: "4001"
      - keyword: 猪高緑地テニスコート
        code: "4802"
      - keyword: 細口池公園テニスコート
        code: "4902"
    days: weekend_holiday
    times: [[9, 17]]
  - name: 細口池 平日夜間
    site: nagoya
    parks:
      - keyword: 細口池公園テニスコート
        code: "4902"
    days: [0, 1, 2, 3, 4]
    times: [[17, 24]]  # 夜間枠は17:00-20:30
