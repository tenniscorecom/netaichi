# 空き状況チェックの条件
#
# account: チェックに使うアカウントグループ（lottery_rules.yaml と同じグループ名）
# courts:  チェック対象コート（value）
# days:    weekend_holiday（土日祝）または曜日リスト（月=0）
# times:   この時間範囲に重なる空きを通知する
# months_ahead: 何ヶ月先までチェックするか
account: oguri
courts: ["130", "180", "400", "410", "660"]
days: weekend_holiday
times: [[9, 17]]
months_ahead: 2
