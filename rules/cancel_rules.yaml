# 集客0レッスンのコート取消設定（ルールB）
#
# days_before: レッスン日の何日前に判定するか
#   2 = テニスベアの募集締切（2日前）と同タイミング。
#   前日9時実行だとGitHub Actionsの遅延でネットあいちの取消期限（前日15時）を
#   過ぎる恐れがあるため2日前に取り消す。
# court_map: テニスベアのコート名(部分一致) → ネットあいち予約一覧でのコート名
#            ネットあいちの予約一覧に出ないコート（上納池など）は載せない＝対象外
days_before: 2
court_map:
  大高緑地: 大高緑地
  モリコロパーク: 愛・地球博記念公園
