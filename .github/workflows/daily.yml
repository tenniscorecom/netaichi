name: daily-prune-cancel

on:
  schedule:
    # 0:13 UTC = 9:13 JST（毎時0分はGitHub側の混雑で遅延しやすいためずらす）
    - cron: '13 0 * * *'
  workflow_dispatch:

concurrency:
  group: daily-prune-cancel
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TZ: Asia/Tokyo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: browser-actions/setup-chrome@v1

      - run: pip install poetry

      - run: poetry install --no-root

      - run: poetry run python -m netaichi daily --headless
        env:
          NETAICHI_DEFAULT_PW: ${{ secrets.NETAICHI_DEFAULT_PW }}
          OGURI_ACCOUNT_ID: ${{ secrets.OGURI_ACCOUNT_ID }}
          KOMADA_ACCOUNT_ID: ${{ secrets.KOMADA_ACCOUNT_ID }}
          OGURI_GSS_ID: ${{ secrets.OGURI_GSS_ID }}
          KOMADA_GSS_ID: ${{ secrets.KOMADA_GSS_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TENNISBEAR_EMAIL: ${{ secrets.TENNISBEAR_EMAIL }}
          TENNISBEAR_PW: ${{ secrets.TENNISBEAR_PW }}
          GSS_CREDENTIALS_JSON: ${{ secrets.GSS_CREDENTIALS_JSON }}
