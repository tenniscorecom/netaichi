name: availability-cities

on:
  schedule:
    # 市営施設（日進・名古屋）は施設が少なく速いので15分間隔
    # 実行はJST 8時〜24時のみ（UTC 23時,0〜14時 = JST 8:00〜23:59）
    # （毎時0分はGitHub側の混雑で遅延しやすいためずらす）
    - cron: '3,18,33,48 0-14,23 * * *'
  workflow_dispatch:

# 前のrunが終わる前に次が始まらないようにする（重複通知・シート競合防止）
concurrency:
  group: availability-cities
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 14

    env:
      TZ: Asia/Tokyo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: browser-actions/setup-chrome@v1

      - run: pip install poetry

      - run: poetry install --no-root

      - run: poetry run python -m netaichi availability --headless --sites eaichi,nagoya
        env:
          NETAICHI_DEFAULT_PW: ${{ secrets.NETAICHI_DEFAULT_PW }}
          OGURI_ACCOUNT_ID: ${{ secrets.OGURI_ACCOUNT_ID }}
          KOMADA_ACCOUNT_ID: ${{ secrets.KOMADA_ACCOUNT_ID }}
          OGURI_GSS_ID: ${{ secrets.OGURI_GSS_ID }}
          KOMADA_GSS_ID: ${{ secrets.KOMADA_GSS_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TENNISBEAR_EMAIL: ${{ secrets.TENNISBEAR_EMAIL }}
          TENNISBEAR_PW: ${{ secrets.TENNISBEAR_PW }}
          GSS_CREDENTIALS_JSON: ${{ secrets.GSS_CREDENTIALS_JSON }}
