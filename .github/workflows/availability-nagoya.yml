name: availability-nagoya

on:
  schedule:
    # フル走査は1時間に1回、JST 8時〜24時のみ（UTC 23時,0〜14時）
    - cron: '43 0-14,23 * * *'
  workflow_dispatch:

# 前のrunが終わる前に次が始まらないようにする（重複通知・シート競合防止）
concurrency:
  group: availability-nagoya
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 14

    env:
      TZ: Asia/Tokyo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: browser-actions/setup-chrome@v1

      - run: pip install poetry

      - run: poetry install --no-root

      # 通知はしない（直近の通知は availability-soon が担当）。ここは2ヶ月先までの
      # スナップショットをシートに溜め、digest コマンドで能動的に見るための取得。
      # cronの遅延で日付をまたぐと、なごやかネットが深夜メンテ中で必ず失敗するためスキップする
      - run: |
          if [ "$(TZ=Asia/Tokyo date +%-H)" -lt 8 ]; then
            echo "JST深夜（なごやかネットのメンテ時間帯）のためスキップ"
            exit 0
          fi
          poetry run python -m netaichi availability --headless --sites nagoya --no-notify
        env:
          NETAICHI_DEFAULT_PW: ${{ secrets.NETAICHI_DEFAULT_PW }}
          OGURI_ACCOUNT_ID: ${{ secrets.OGURI_ACCOUNT_ID }}
          KOMADA_ACCOUNT_ID: ${{ secrets.KOMADA_ACCOUNT_ID }}
          OGURI_GSS_ID: ${{ secrets.OGURI_GSS_ID }}
          KOMADA_GSS_ID: ${{ secrets.KOMADA_GSS_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TENNISBEAR_EMAIL: ${{ secrets.TENNISBEAR_EMAIL }}
          TENNISBEAR_PW: ${{ secrets.TENNISBEAR_PW }}
          GSS_CREDENTIALS_JSON: ${{ secrets.GSS_CREDENTIALS_JSON }}
